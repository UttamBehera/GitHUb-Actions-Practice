name: Deploy Flask App

on:
    workflow_dispatch:



jobs:
    
    deploy:
        
        runs-on: self-hosted
        env:
            DOCKERHUB_USER2: ${{ secrets.DOCKERHUB2_USERNAME }}


        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: deploy with docker compose
              run: docker compose up -d --build
